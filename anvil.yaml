      client_hidden: false
      name: email
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: feedback
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: created
      type: datetime
    indexes: []
    server: full
    title: Feedback
  mindmaps:
    client: none
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: title
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: nodes
      type: simpleObject
    - admin_ui: {width: 200}
      client_hidden: false
      name: created
      type: datetime
    - admin_ui: {width: 200}
      client_hidden: false
      name: updated
      type: datetime
    indexes: []
    server: full
    title: mindmaps
  progress:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: count
      type: number
    indexes: []
    server: full
    title: Progress
  tasks:
    client: full
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: task_name
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: subject
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: due_date
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: priority
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: username
      type: string
    indexes: []
    server: full
    title: tasks
  users:
    client: none
    columns:
    - admin_ui: {width: 200}
      client_hidden: null
      name: email
      type: string
    - admin_ui: {width: 200}
      client_hidden: null
      name: enabled
      type: bool
    - admin_ui: {width: 200}
      client_hidden: null
      name: last_login
      type: datetime
    - admin_ui: {width: 200}
      client_hidden: null
      name: password_hash
      type: string
    - admin_ui: {width: 200}
      client_hidden: null
      name: n_password_failures
      type: number
    - admin_ui: {width: 200}
      client_hidden: null
      name: confirmed_email
      type: bool
    - admin_ui: {width: 200}
      client_hidden: null
      name: signed_up
      type: datetime
    indexes: []
    server: full
    title: Users
