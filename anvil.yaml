allow_embedding: false
correct_dependency_ids: {}
db_schema:
  articles:
    client: none
    columns:
    - admin_ui: {width: 200}
      name: title
      type: string
    - admin_ui: {width: 200}
      name: content
      type: string
    - admin_ui: {width: 200}
      name: image
      type: media
    - admin_ui: {width: 200}
      name: created
      type: datetime
    - admin_ui: {width: 200}
      name: updated
      type: datetime
    - admin_ui: {width: 200}
      name: category
      target: categories
      type: link_single
    server: full
    title: Articles
  categories:
    client: search
    columns:
    - admin_ui: {width: 200}
      name: name
      type: string
    server: full
    title: Categories
  feedback:
    client: none
    columns:
    - admin_ui: {width: 200}
