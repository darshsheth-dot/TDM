allow_embedding: false
correct_dependency_ids: {}
db_schema:
  articles:
    client: none
    columns:
    - admin_ui: {width: 200}
      name: title
      type: string
    - admin_ui: {width: 200}
      name: content
      type: string
    - admin_ui: {width: 200}
      name: image
      type: media
    - admin_ui: {width: 200}
      name: created
      type: datetime
    - admin_ui: {width: 200}
      name: updated
      type: datetime
    - admin_ui: {width: 200}
      name: category
      target: categories
      type: link_single
    server: full
    title: Articles
  categories:
    client: search
    columns:
    - admin_ui: {width: 200}
      name: name
      type: string
    server: full
    title: Categories
  feedback:
    client: none
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: name
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: email
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: feedback
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: created
      type: datetime
    indexes: []
    server: full
    title: Feedback
  mindmaps:
    client: none
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: title
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: nodes
      type: simpleObject
    - admin_ui: {width: 200}
      client_hidden: false
      name: created
      type: datetime
    - admin_ui: {width: 200}
      client_hidden: false
      name: updated
      type: datetime
    indexes: []
    server: full
    title: mindmaps
  progress:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: count
      type: number
    indexes: []
    server: full
    title: Progress
  tasks:
    client: full
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: task_name
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: subject
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: due_date
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: priority
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: username
      type: string
    indexes: []
    server: full
    title: tasks
  users:
    client: full
    columns:
    - admin_ui: {width: 200}
      client_hidden: null
      name: email
      type: string
    - admin_ui: {width: 200}
      client_hidden: null
      name: enabled
      type: bool
    - admin_ui: {width: 200}
      client_hidden: null
      name: last_login
      type: datetime
    - admin_ui: {width: 200}
      client_hidden: null
      name: password_hash
      type: string
    - admin_ui: {width: 200}
      client_hidden: null
      name: n_password_failures
      type: number
    - admin_ui: {width: 200}
      client_hidden: null
      name: confirmed_email
      type: bool
    - admin_ui: {width: 200}
      client_hidden: null
      name: signed_up
      type: datetime
    - admin_ui: {order: 7, width: 200}
      client_hidden: true
      name: remembered_logins
      type: simpleObject
    - admin_ui: {}
      client_hidden: null
      name: email_confirmation_key
      type: string
    indexes: []
    server: full
    title: Users
dependencies: []
metadata: {description: '', logo_img: 'asset:dboard logo.png', title: The Daily Mentor}
name: Syon, Darsh, Ishaan
native_deps: {head_html: ''}
package_name: News_App
renamed: true
runtime_options:
  client_version: '3'
  server_spec: {base: python310-minimal}
  server_version: python3-full
  version: 2
services:
- client_config: {}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/anvil/email.yml
- client_config: {allow_remember_me: true, allow_signup: true, confirm_email: false, enable_automatically: true, remember_me_days: 365, use_email: true, use_google: true}
  server_config:
    email_content:
      confirm_address:
        html: |-
          <p>Thanks for registering your account with us. Please click the following link to confirm that this is your account:</p>
          <p>{{confirm_link}}</p>
          <p>Thanks,</p>
          <p>The team</p>
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/google.yml
startup: {module: Blok, type: form}
startup_form: null
